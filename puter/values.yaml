# Default values for puter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/heyputer/puter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  runAsUser: 0

env:
  PUID: 1000
  PGID: 1000

longhorn:
  enabled: true
  persistentVolumes:
    puter-config:
      storageSize: 5G
    puter-data:
      storageSize: 1G

service:
  type: ClusterIP
  targetPort: 4100
  port: 80

ingress:
  enabled: enabled

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

configMapJson: |-
  {
    "config_name": "generated default config",
    "env": "dev",
    "nginx_mode": false,
    "server_id": "localhost",
    "http_port": "auto",
    "domain": "puter.gbklabs.com",
    "protocol": "http",
    "contact_email": "hey@example.com",
    "services": {
        "database": {
            "engine": "sqlite",
            "path": "puter-database.sqlite"
        },
        "thumbnails": {
            "engine": "purejs"
        },
        "file-cache": {
            "disk_limit": 16384,
            "disk_max_size": 16384,
            "precache_size": 16384,
            "path": "./file-cache"
        }
    },
    "cookie_name": "c35f9c08-1ba9-4f1a-b092-cc235057ca95",
    "jwt_secret": "8627b13d-fd33-48d4-a770-9ad3107db409",
    "url_signature_secret": "80f55516-d767-4531-95dd-1f680a35788d",
    "": null
  }

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
  - name: config-json
    configMap: 
      name: puter
  - name: data
    persistentVolumeClaim:
      claimName: puter-data-pvc
  - name: config
    persistentVolumeClaim:
      claimName: puter-config-pvc


# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  - name: data
    mountPath: "/var/puter"
  - name: config
    mountPath: "/etc/puter"
  - name: config-json
    mountPath: "/etc/puter/config.json"
    subPath: config.json

nodeSelector: {}

tolerations: []

affinity: {}
