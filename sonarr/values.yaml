# Default values for sonarr.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: lscr.io/linuxserver/sonarr
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: NodePort
  targetPort: 8989
  port: 80

ingress:
  enabled: true
  className: "tailscale"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: sonarr
  tls:
    - hosts:
       - sonarr

env:
  TZ: "Etc/UTC"
  PUID: "0"
  PGID: "0"
  UMASK: "002"

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# livenessProbe:
#   httpGet:
#     path: /
#     port: http
# readinessProbe:
#   httpGet:
#     path: /
#     port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Volume configuration
# - config: sonarr-specific (Longhorn RWO)
# - downloads: shared with qbittorrent (media-storage RWX)
# - tv: shared with jellyfin (media-storage RWX)
volumes:
  - name: config
    persistentVolumeClaim:
      claimName: sonarr-config-pvc
  - name: downloads
    persistentVolumeClaim:
      claimName: media-downloads-pvc
  - name: tv
    persistentVolumeClaim:
      claimName: media-tv-pvc

volumeMounts:
  - name: config
    mountPath: /config
  - name: downloads
    mountPath: /downloads
  - name: tv
    mountPath: /tv

# Only config PVC is managed by this chart (Longhorn RWO)
# Shared media PVCs are managed by media-storage chart
longhorn:
  enabled: true
  persistentVolumes:
    sonarr-config:
      storageSize: 5Gi
      storageClassName: longhorn-ssd

nodeSelector: {}

tolerations: []

affinity: {}
