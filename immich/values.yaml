# Default values for immich.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 3

image:
  repository: ghcr.io/imagegenius/immich
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.106.2"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

postgres:
  securityContext:
    privileged: true
    runAsUser: 999
  readinessProbe:
    exec:
      command: 
        - pg_isready
  enabled: true
  envFrom:
    - secretRef: 
        name: immich-postgres-secret
  image:
    repository: "tensorchord/pgvecto-rs"
    tag: pg14-v0.2.0
  volumeMounts:
    - mountPath: /var/lib/postgresql/data
      name: postgres-storage
  volumes:
    - name: postgres-storage
      persistentVolumeClaim:
        claimName: immich-postgresql-new-pvc
  sealedSecrets:
    enabled: true
    name: immich-postgres-secret
    secret:
      POSTGRES_DB: 
      POSTGRES_PASSWORD: 
      POSTGRES_USER: 

redis:
  enabled: true
  image:
    repository: redis
    tag: latest

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}

service:
  type: NodePort
  targetPort: 8080
  port: 80

envFrom:
  - secretRef:
      name: immich-secret

ingress:
  enabled: true
  className: "tailscale"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: immich
  tls:
    - hosts:
       - immich

volumeMounts:
  - mountPath: /photos
    name: photos-storage
  - mountPath: /config
    name: config
  - mountPath: /usr/src/app/external/downloads
    name: stuff-storage
  - mountPath: /usr/src/app/external/gphotos
    name: gphotos

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: 3003
readinessProbe:
  httpGet:
    path: /
    port: 3003

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

persistentVolumes:
  enabled: true
  pvs:
    immich-photos:
      storageSize: 1T
      path: /mount/immich/photos
      nodeName: egbp
    immich-config:
      storageSize: 3Gi
      path: /mount/immich/config
      nodeName: egbp
    photos:
      storageSize: 300Gi
      path: '/mount/Media/Google Photos'
      nodeName: egbp
    stuff:
      storageSize: 60Gi
      path: /mount/qBittorrent/downloads/downloads
      nodeName: egbp

# Additional volumes on the output Deployment definition.
volumes:
  - name: photos-storage
    persistentVolumeClaim:
      claimName: immich-photos-pvc
  - name: stuff-storage
    persistentVolumeClaim:
      claimName: stuff-pvc
  - name: config
    persistentVolumeClaim:
      claimName: immich-config-pvc
  - name: gphotos
    persistentVolumeClaim:
      claimName: photos-pvc
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

sealedSecrets:
  enabled: true
  secret:
    DB_DATABASE_NAME: 
    DB_HOSTNAME: 
    DB_PASSWORD: 
    DB_PORT: 
    DB_USERNAME: 
    PGID: 
    PUID: 
    REDIS_HOSTNAME: 
    REDIS_PORT: 
    TZ: 
