apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudflared
  name: cloudflared
spec:
  replicas: 4 # you might want to adjust the replicas to your own needs
  selector:
    matchLabels:
      app: cloudflared
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - args:
        - tunnel
        - --no-autoupdate
        - --metrics
        - 0.0.0.0:8081
        - run
        - --token
        - $(token)
        envFrom:
        - secretRef:
            name: cloudflared
        env:
        - name: TZ
          value: UTC
        image: cloudflare/cloudflared:latest # you might want to pin this to a version
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        name: tunnel
        ports:
        - containerPort: 8081
          name: http-metrics
