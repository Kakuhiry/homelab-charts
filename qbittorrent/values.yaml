# Default values for qbittorrent.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: lscr.io/linuxserver/qbittorrent
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: NodePort
  targetPort: 8080
  port: 80

env:
  PUID: "0"
  PGID: "0"
  TZ: "Etc/UTC"

ingress:
  enabled: true

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Volume configuration
# - config: qbittorrent-specific (Longhorn RWO)
# - downloads: shared with sonarr/radarr (media-storage RWX)
volumeMounts:
  - name: config
    mountPath: /config
  - name: downloads
    mountPath: /downloads

volumes:
  - name: config
    persistentVolumeClaim:
      claimName: qbittorrent-config-pvc
  - name: downloads
    persistentVolumeClaim:
      claimName: media-downloads-pvc

# Only config PVC is managed by this chart (Longhorn RWO)
# Shared media PVCs are managed by media-storage chart
longhorn:
  enabled: true
  persistentVolumes:
    qbittorrent-config:
      storageSize: 5Gi
      storageClassName: longhorn-ssd

nodeSelector: {}

tolerations: []

affinity: {}
