replicaCount: 1

hostNetwork: false

port: 8096
hostPort:
  enabled: false
  port: 8096

image:
  repository: docker.io/linuxserver/jellyfin
  pullPolicy: IfNotPresent
  tag: '10.9.4'

serviceAccount:
  create: false

podSecurityContext: {}

securityContext:
  capabilities:
    add:
      - NET_ADMIN

strategy:
  type: Recreate

service:
  type: NodePort
  port: 80
  targetPort: 8096
  annotations:
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: jellyfin-session
    traefik.ingress.kubernetes.io/service.sticky.cookie.secure: "true"

ingress:
  enabled: true

# Config PVC managed by this chart (Longhorn RWO)
longhorn:
  enabled: true
  persistentVolumes:
    jellyfin-config:
      storageSize: 100Gi
      storageClassName: longhorn-ssd

resources:
  limits:
    gpu.intel.com/i915: 1

nodeSelector: {}
tolerations: []
affinity: {}

env:
  PUID: "0"
  PGID: "0"

secretEnv: {}

dnsConfig: {}
dnsPolicy: ClusterFirst

# Config persistence - jellyfin specific (Longhorn RWO)
persistence:
  config:
    enabled: true
    isPvc: true
    existingClaim: jellyfin-config-pvc
  data:
    enabled: false  # Using extraVolumes for shared media

# Shared media volumes from media-storage chart (Longhorn RWX)
extraVolumes:
  - name: dri
    hostPath:
      path: /dev/dri
  - name: tv
    persistentVolumeClaim:
      claimName: media-tv-pvc
  - name: movies
    persistentVolumeClaim:
      claimName: media-movies-pvc

extraVolumeMounts:
  - name: dri
    mountPath: /dev/dri
  - name: tv
    mountPath: /data/tvshows
  - name: movies
    mountPath: /data/movies

livenessProbe: {}
readinessProbe: {}
initContainers: []
sidecarContainers: []
additionalPorts: []
additionalServicePorts: []
