service:
  type: NodePort
  port: 80
  targetPort: 8096

image:
  tag: '10.9.4'

serviceAccount:
  create: false

ingress:
  enabled: true

longhorn:
  enabled: true
  persistentVolumes:
    jellyfin-config:
      storageSize: 536870912k

resources:
  limits:
    cpu: "4"
    memory: "6200Mi"
    gpu.intel.com/i915: 1

nodeSelector:
  kubernetes.io/hostname: "nuc-egbk"
env:
  PUID: "0"
  PGID: "0"

persistence:
  config:
    enabled: true
    isPvc: true
    existingClaim: jellyfin-config-pvc
  data:
    enabled: true
    isPvc: true
    existingClaim: jellyfin-storage-pvc

#"dst":    ["autogroup:internet:*"],