image:
  repository: pihole/pihole
  tag: "2024.07.0"
  pullPolicy: IfNotPresent

# Web admin password — override with a Sealed Secret or external-secrets in production
webPassword: "changeme"

timezone: "America/Santo_Domingo"

# Pin to the node with the static IP used for DNS
nodeSelector:
  kubernetes.io/hostname: egbp

persistence:
  storageClass: longhorn-ssd
  size: 5Gi

# LoadBalancer IP for DNS (UDP/TCP port 53)
dnsLoadBalancerIP: ""
